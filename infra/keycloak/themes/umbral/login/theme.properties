# UMBRAL login theme — extends the stock Keycloak login theme and overrides
# only the visual layer via CSS. No FTL templates are replaced, so it stays
# resilient across Keycloak versions; if the base stylesheet name differs in
# your version, adjust the `styles` line (check the parent theme.properties).
parent=keycloak
import=common/keycloak
styles=css/login.css css/umbral.css
# Valida el input del login (correo + requerido) sin sobrescribir templates .ftl.
scripts=js/umbral-login.js
