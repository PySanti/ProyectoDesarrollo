# Docker Compose for the four-service UMBRAL topology, behind the YARP gateway.
# Target services: gateway, identity-service, partidas, operaciones-sesion, puntuaciones.
# Do not add audit-service, scoring-service, or treasure-hunt-service.

services:
  postgres:
    image: postgres:16
    container_name: umbral-postgres
    environment:
      POSTGRES_USER: umbral
      POSTGRES_PASSWORD: 16102005
      POSTGRES_DB: umbral
    ports:
      - "55432:5432"
    volumes:
      - umbral-postgres-data:/var/lib/postgresql/data
      # Init SQL versionado (el viejo ./postgres/init quedó vacío y root-owned).
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbral -d umbral"]
      interval: 2s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:3-management
    container_name: umbral-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 3s
      timeout: 5s
      retries: 30

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: umbral-keycloak
    # --import-realm seeds UMBRAL-UCAB (realm, roles, clients, test users) from
    # /opt/keycloak/data/import on startup when the realm does not already exist.
    # This keeps the realm reproducible: recreating the container no longer loses it.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      # UMBRAL login theme. start-dev disables theme caching, so CSS edits
      # hot-reload. The realm import (umbral-realm.json) already sets
      # loginTheme=umbral, so the branded credentials page is active by default.
      # See infra/keycloak/README.md.
      - ./keycloak/themes:/opt/keycloak/themes
      # Realm import source (read on startup by --import-realm).
      - ./keycloak/import:/opt/keycloak/data/import
      # Persist Keycloak data so users/changes created at runtime survive a
      # container recreation. Wipe with `docker compose down -v` to re-seed
      # from the import file.
      - umbral-keycloak-data:/opt/keycloak/data

  # Convergencia declarativa del realm (config-as-code). --import-realm solo
  # importa cuando el realm NO existe (IGNORE_EXISTING): un volumen persistido
  # con un realm viejo queda desactualizado (sin audience mappers, sin roles de
  # permisos) y produce 401/403. Este one-shot aplica umbral-realm.json sobre el
  # Keycloak en ejecución en cada `up`: crea/actualiza roles, clientes, mappers
  # y usuarios sembrados, y NO borra usuarios creados en runtime. Sale con 0 al
  # terminar; no queda corriendo.
  keycloak-config:
    image: adorsys/keycloak-config-cli:6.5.1-25.0.1
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin
      # Espera a que Keycloak esté disponible antes de importar.
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES_LOCATIONS: /config/umbral-realm.json
      # Sin esto, config-cli se salta la importación si el JSON no cambió desde el
      # último run (caché por checksum en un atributo del realm) y NO repararía
      # deriva hecha en runtime. (IMPORT_FORCE no existe en la serie 6.x.)
      IMPORT_CACHE_ENABLED: "false"
    volumes:
      - ./keycloak/import:/config:ro
    depends_on:
      keycloak:
        condition: service_started
    restart: "no"

  identity-service:
    build:
      context: ../services/identity-service
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDatabase: Host=postgres;Port=5432;Database=umbral_identity;Username=umbral;Password=16102005
      RabbitMq__Enabled: "true"
      RabbitMq__Host: rabbitmq
      RabbitMqConsumer__Enabled: "true"
      RabbitMqConsumer__Host: rabbitmq
      RabbitMqCredencialesConsumer__Enabled: "true"
      RabbitMqCredencialesConsumer__Host: rabbitmq
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_CLIENT_ID: identity-service
      KEYCLOAK_VALID_AUDIENCES: identity-service,umbral-web,umbral-mobile,account
      KEYCLOAK_VALID_ISSUERS: http://localhost:8080/realms/UMBRAL-UCAB,http://keycloak:8080/realms/UMBRAL-UCAB,http://${LAN_IP:-localhost}:8080/realms/UMBRAL-UCAB
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-UMBRAL}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  gateway:
    build:
      context: ../gateway
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_VALID_AUDIENCES: umbral-web,umbral-mobile,account
      KEYCLOAK_VALID_ISSUERS: http://localhost:8080/realms/UMBRAL-UCAB,http://keycloak:8080/realms/UMBRAL-UCAB,http://${LAN_IP:-localhost}:8080/realms/UMBRAL-UCAB
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      ReverseProxy__Clusters__identity__Destinations__d1__Address: http://identity-service:8080/
      ReverseProxy__Clusters__partidas__Destinations__d1__Address: http://partidas:8080/
      ReverseProxy__Clusters__operaciones-sesion__Destinations__d1__Address: http://operaciones-sesion:8080/
      ReverseProxy__Clusters__puntuaciones__Destinations__d1__Address: http://puntuaciones:8080/
    depends_on:
      - identity-service
      - partidas
      - operaciones-sesion
      - puntuaciones
      - keycloak

  partidas:
    build:
      context: ../services/partidas
    ports:
      - "5010:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PartidasDatabase: Host=postgres;Port=5432;Database=umbral_partidas;Username=umbral;Password=16102005
      EF_MIGRATE_ON_STARTUP: "true"
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_VALID_AUDIENCES: umbral-web,umbral-mobile
      KEYCLOAK_VALID_ISSUERS: http://localhost:8080/realms/UMBRAL-UCAB,http://keycloak:8080/realms/UMBRAL-UCAB,http://${LAN_IP:-localhost}:8080/realms/UMBRAL-UCAB
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  operaciones-sesion:
    build:
      context: ../services/operaciones-sesion
    ports:
      - "5020:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OperacionesSesionDatabase: Host=postgres;Port=5432;Database=umbral_operaciones_sesion;Username=umbral;Password=16102005
      EF_MIGRATE_ON_STARTUP: "true"
      RabbitMq__Enabled: "true"
      RabbitMq__Host: rabbitmq
      IdentityApi__BaseUrl: http://identity-service:8080
      PartidasApi__BaseUrl: http://partidas:8080
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_VALID_AUDIENCES: umbral-web,umbral-mobile
      KEYCLOAK_VALID_ISSUERS: http://localhost:8080/realms/UMBRAL-UCAB,http://keycloak:8080/realms/UMBRAL-UCAB,http://${LAN_IP:-localhost}:8080/realms/UMBRAL-UCAB
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
      partidas:
        condition: service_started
      identity-service:
        condition: service_started

  puntuaciones:
    build:
      context: ../services/puntuaciones
    ports:
      - "5030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PuntuacionesDatabase: Host=postgres;Port=5432;Database=umbral_puntuaciones;Username=umbral;Password=16102005
      EF_MIGRATE_ON_STARTUP: "true"
      RabbitMq__Enabled: "true"
      RabbitMq__Host: rabbitmq
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_VALID_AUDIENCES: umbral-web,umbral-mobile
      KEYCLOAK_VALID_ISSUERS: http://localhost:8080/realms/UMBRAL-UCAB,http://keycloak:8080/realms/UMBRAL-UCAB,http://${LAN_IP:-localhost}:8080/realms/UMBRAL-UCAB
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - gateway

volumes:
  umbral-postgres-data:
  umbral-keycloak-data:
