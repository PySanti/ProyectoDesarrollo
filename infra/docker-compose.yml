# Docker Compose for the four-service UMBRAL topology, behind the YARP gateway.
# Target services: gateway, identity-service, partidas, operaciones-sesion, puntuaciones.
# Legacy (in transit, dismantled in SP-3/SP-4): trivia-game-service, bdt-game-service.
# Do not add audit-service, scoring-service, or treasure-hunt-service.

services:
  postgres:
    image: postgres:16
    container_name: umbral-postgres
    environment:
      POSTGRES_USER: umbral
      POSTGRES_PASSWORD: 16102005
      POSTGRES_DB: umbral
    ports:
      - "55432:5432"
    volumes:
      - umbral-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: umbral-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: umbral-keycloak
    # --import-realm seeds UMBRAL-UCAB (realm, roles, clients, test users) from
    # /opt/keycloak/data/import on startup when the realm does not already exist.
    # This keeps the realm reproducible: recreating the container no longer loses it.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      # UMBRAL login theme. start-dev disables theme caching, so CSS edits
      # hot-reload. The realm import (umbral-realm.json) already sets
      # loginTheme=umbral, so the branded credentials page is active by default.
      # See infra/keycloak/README.md.
      - ./keycloak/themes:/opt/keycloak/themes
      # Realm import source (read on startup by --import-realm).
      - ./keycloak/import:/opt/keycloak/data/import
      # Persist Keycloak data so users/changes created at runtime survive a
      # container recreation. Wipe with `docker compose down -v` to re-seed
      # from the import file.
      - umbral-keycloak-data:/opt/keycloak/data

  identity-service:
    build:
      context: ../services/identity-service
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDatabase: Host=postgres;Port=5432;Database=umbral_identity;Username=umbral;Password=16102005
      RabbitMq__Host: rabbitmq
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_CLIENT_ID: identity-service
      KEYCLOAK_VALID_AUDIENCES: identity-service,umbral-web,umbral-mobile,account
    depends_on:
      - postgres
      - rabbitmq
      - keycloak

  gateway:
    build:
      context: ../gateway
    ports:
      - "5080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_VALID_AUDIENCES: umbral-web,umbral-mobile,account
      ReverseProxy__Clusters__identity__Destinations__d1__Address: http://identity-service:8080/
      ReverseProxy__Clusters__partidas__Destinations__d1__Address: http://partidas:8080/
      ReverseProxy__Clusters__operaciones-sesion__Destinations__d1__Address: http://operaciones-sesion:8080/
      ReverseProxy__Clusters__puntuaciones__Destinations__d1__Address: http://puntuaciones:8080/
    depends_on:
      - identity-service
      - partidas
      - operaciones-sesion
      - puntuaciones
      - keycloak

  partidas:
    build:
      context: ../services/partidas
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PartidasDatabase: Host=postgres;Port=5432;Database=umbral_partidas;Username=umbral;Password=16102005
    depends_on:
      - postgres

  operaciones-sesion:
    build:
      context: ../services/operaciones-sesion
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__OperacionesSesionDatabase: Host=postgres;Port=5432;Database=umbral_operaciones_sesion;Username=umbral;Password=16102005
    depends_on:
      - postgres

  puntuaciones:
    build:
      context: ../services/puntuaciones
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PuntuacionesDatabase: Host=postgres;Port=5432;Database=umbral_puntuaciones;Username=umbral;Password=16102005
    depends_on:
      - postgres

  trivia-game-service:
    build:
      context: ../services/trivia-game-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=umbral_trivia_game;Username=umbral;Password=16102005
      RabbitMq__Host: rabbitmq
      IdentityService__BaseUrl: http://identity-service
    depends_on:
      - postgres
      - rabbitmq
      - identity-service

  bdt-game-service:
    build:
      context: ../services/bdt-game-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__BdtDatabase: Host=postgres;Port=5432;Database=umbral_bdt_game;Username=umbral;Password=16102005
      RabbitMq__Host: rabbitmq
      IdentityService__BaseUrl: http://identity-service
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_CLIENT_ID: bdt-game-service
      KEYCLOAK_VALID_AUDIENCES: bdt-game-service,umbral-web,umbral-mobile,account
    depends_on:
      - postgres
      - rabbitmq
      - identity-service

volumes:
  umbral-postgres-data:
  umbral-keycloak-data:
