# Docker Compose placeholder for the four-service UMBRAL topology.
#
# This file intentionally defines only the approved backend services:
# - identity-service
# - team-service
# - trivia-game-service
# - bdt-game-service
#
# Do not add audit-service, scoring-service, trivia-service or treasure-hunt-service
# unless a future ADR changes the topology.

services:
  postgres:
    image: postgres:16
    container_name: umbral-postgres
    environment:
      POSTGRES_USER: umbral
      POSTGRES_PASSWORD: 16102005
      POSTGRES_DB: umbral
    ports:
      - "55432:5432"
    volumes:
      - umbral-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: umbral-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: umbral-keycloak
    # --import-realm seeds UMBRAL-UCAB (realm, roles, clients, test users) from
    # /opt/keycloak/data/import on startup when the realm does not already exist.
    # This keeps the realm reproducible: recreating the container no longer loses it.
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      # UMBRAL login theme. start-dev disables theme caching, so CSS edits
      # hot-reload. The realm import (umbral-realm.json) already sets
      # loginTheme=umbral, so the branded credentials page is active by default.
      # See infra/keycloak/README.md.
      - ./keycloak/themes:/opt/keycloak/themes
      # Realm import source (read on startup by --import-realm).
      - ./keycloak/import:/opt/keycloak/data/import
      # Persist Keycloak data so users/changes created at runtime survive a
      # container recreation. Wipe with `docker compose down -v` to re-seed
      # from the import file.
      - umbral-keycloak-data:/opt/keycloak/data

  identity-service:
    build:
      context: ../services/identity-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__IdentityDatabase: Host=postgres;Port=5432;Database=umbral_identity;Username=umbral;Password=16102005
      RabbitMq__Host: rabbitmq
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_CLIENT_ID: identity-service
      KEYCLOAK_VALID_AUDIENCES: identity-service,umbral-web,account
    depends_on:
      - postgres
      - rabbitmq
      - keycloak

  team-service:
    build:
      context: ../services/team-service
    ports:
      - "5099:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TeamDatabase: Host=postgres;Port=5432;Database=umbral_team;Username=umbral;Password=16102005
      RabbitMq__Host: rabbitmq
      IdentityService__BaseUrl: http://identity-service
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_CLIENT_ID: team-service
      KEYCLOAK_VALID_AUDIENCES: team-service,umbral-mobile,account
    depends_on:
      - postgres
      - rabbitmq
      - identity-service
      - keycloak

  trivia-game-service:
    build:
      context: ../services/trivia-game-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=umbral_trivia_game;Username=umbral;Password=umbral
      RabbitMq__Host: rabbitmq
      TeamService__BaseUrl: http://team-service
      IdentityService__BaseUrl: http://identity-service
    depends_on:
      - postgres
      - rabbitmq
      - identity-service
      - team-service

  bdt-game-service:
    build:
      context: ../services/bdt-game-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__BdtDatabase: Host=postgres;Port=5432;Database=umbral_bdt_game;Username=umbral;Password=16102005
      RabbitMq__Host: rabbitmq
      TeamService__BaseUrl: http://team-service
      IdentityService__BaseUrl: http://identity-service
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: UMBRAL-UCAB
      KEYCLOAK_CLIENT_ID: bdt-game-service
      KEYCLOAK_VALID_AUDIENCES: bdt-game-service,umbral-web,umbral-mobile,account
    depends_on:
      - postgres
      - rabbitmq
      - identity-service
      - team-service

volumes:
  umbral-postgres-data:
  umbral-keycloak-data:
